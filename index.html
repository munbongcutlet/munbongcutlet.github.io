<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문봉 돈까스 | Munbong Tonkatsu</title>
    <style>
        :root {
            --point-brown: #7B3F00;
            --main-orange: #D35400;
            --bg-cream: #FFF5E1;
            --soft-beige: #F5DEB3;
            --text-dark: #3E2723;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #E6D5C3;
            font-family: 'Pretendard', sans-serif;
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* [Main Container] */
        .container {
            /* 기본적으로 너비는 100%를 지향하되 최대 1800px */
            width: 100%;
            max-width: 1800px;
            /* 높이는 가변적이나 초기엔 520px 이상 유지 */
            min-height: 520px;
            background: var(--bg-cream);
            border: clamp(4px, 1vw, 8px) solid var(--point-brown);
            display: flex;
            flex-wrap: wrap; /* 모바일에서 떨어지도록 설정 */
            position: relative;
            overflow: hidden;
            box-shadow: 15px 15px 0px rgba(123, 63, 0, 0.1);
        }

        /* [Left Side: Hero] */
        .hero-section {
            flex: 1 1 55%; /* 기본 55% 점유 */
            min-width: 300px;
            padding: clamp(2rem, 5vw, 4rem);
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-color: var(--soft-beige);
            border-right: 2px dashed var(--point-brown);
        }

        .main-title {
            /* 구간 사이에서 자연스럽게 변하는 폰트 크기 */
            font-size: clamp(2.5rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1;
            color: var(--point-brown);
        }

        .main-title span { color: var(--main-orange); display: block; }

        /* [Right Side: Menu] */
        .menu-section {
            flex: 1 1 45%;
            min-width: 300px;
            padding: clamp(1.5rem, 4vw, 3rem);
            background: var(--bg-cream);
        }

        .menu-list { list-style: none; }
        .menu-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(123, 63, 0, 0.1);
            font-weight: 600;
            font-size: clamp(0.9rem, 1.2vw, 1.2rem);
        }

        /* [Media Queries] */
        
        /* 1. 데스크탑 기본 (1800px 이하) */
        @media (max-width: 1800px) {
            .container { max-width: 1400px; }
        }

        /* 2. 노트북/태블릿 가로 (1200px 이하) */
        @media (max-width: 1200px) {
            .container { max-width: 980px; }
            .hero-section { padding: 30px; }
        }

        /* 3. 태블릿 세로/작은 모니터 (980px 이하) */
        @media (max-width: 980px) {
            .container { 
                max-width: 700px; 
                flex-direction: column; /* 여기서 위아래로 쌓임 */
            }
            .hero-section { 
                width: 100%; 
                border-right: none; 
                border-bottom: 2px dashed var(--point-brown);
                min-height: 300px;
            }
            .menu-section { width: 100%; }
        }

        /* 4. 모바일 (400px 이하) */
        @media (max-width: 400px) {
            body { padding: 10px; }
            .container { border-width: 4px; }
            .main-title { font-size: 2.5rem; }
            .hero-section { padding: 20px; min-height: 200px; }
            .menu-section { padding: 20px; }
            .badge { display: none; } /* 모바일에서 복잡하면 숨김 */
        }

        .badge {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 100px; height: 100px;
            background: var(--main-orange);
            color: white;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; transform: rotate(-10deg);
            border: 3px solid var(--point-brown);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-section">
            <p style="font-weight: 800; color: var(--main-orange);">SINCE 2010</p>
            <h1 class="main-title">MUNBONG<span>KATSU</span></h1>
            <p style="margin-top:15px;">돈까스 스파게티 세트 / 문봉 정식 / 순두부 세트</p>
        </div>

        <div class="menu-section">
            <h2 style="margin-bottom:20px; border-bottom:3px solid var(--point-brown);">MENU LIST</h2>
            <ul class="menu-list">
                <li class="menu-item"><span>문봉 정식 (돈까스+함박)</span> <span>Sig.</span></li>
                <li class="menu-item"><span>돈까스 순두부 세트</span> <span>Best</span></li>
                <li class="menu-item"><span>돈까스 반모밀 세트</span> <span>Combi</span></li>
                <li class="menu-item"><span>클래식 돈까스 1인분</span> <span>10.0</span></li>
                <li class="menu-item"><span>김치 어묵 우동</span> <span>Hot</span></li>
                <li class="menu-item"><span>냉모밀 (여름한정)</span> <span>Ice</span></li>
            </ul>
        </div>

        <div class="badge">ALWAYS<br>CRISPY</div>
    </div>

</body>
</html>
