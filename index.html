<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>문봉 돈까스 | Munbong Tonkatsu</title>
    <style>
        :root {
            --point-brown: #5D2E00;
            --main-orange: #D35400;
            --bg-cream: #FFF5E1;
            --soft-beige: #F5DEB3;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background-color: #E6D5C3;
            font-family: 'Pretendard', sans-serif;
            color: var(--point-brown);
        }

        /* [Main Container] */
        .wrapper {
            max-width: 1800px;
            margin: 0 auto;
            background: var(--bg-cream);
            border-left: 2px solid var(--point-brown);
            border-right: 2px solid var(--point-brown);
            min-height: 100vh;
        }

        /* [Top Hero Section] - 이미지 배경 */
        .hero-header {
            width: 100%;
            height: clamp(400px, 60vh, 800px); /* 1800~400 사이 유동적 높이 */
            background: linear-gradient(to bottom, rgba(0,0,0,0.1), rgba(0,0,0,0.4)), 
                        url('https://img1.daumcdn.net/thumb/R1280x0/?scode=mtistory2&fname=https%3A%2F%2Fblog.kakaocdn.net%2Fdna%2Fp34MO%2FdJMcabwqGcY%2FAAAAAAAAAAAAAAAAAAAAAPphvyXqIXtdwhtrKNBz0cGkFAnBnWy-3KQQvdB2_Vjt%2Fimg.jpg%3Fcredential%3DyqXZFxpELC7KVnFOS48ylbz2pIh7yKj8%26expires%3D1772290799%26allow_ip%3D%26allow_referer%3D%26signature%3D61PPrR63sHoFT7qY4eeW2caopMw%253D');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--white);
            text-align: center;
            position: relative;
        }

        .hero-header h1 {
            font-size: clamp(3rem, 10vw, 8rem);
            font-weight: 900;
            text-shadow: 4px 4px 0px var(--point-brown);
            line-height: 0.9;
        }

        .hero-header p {
            font-size: clamp(1rem, 2vw, 1.8rem);
            margin-top: 20px;
            background: var(--main-orange);
            padding: 5px 20px;
            font-weight: 600;
        }

        /* [Content Section] */
        .content-grid {
            display: flex;
            flex-wrap: wrap;
            max-width: 1200px;
            margin: -50px auto 0; /* 이미지 위로 살짝 겹치게 */
            background: var(--white);
            position: relative;
            z-index: 10;
            border: 4px solid var(--point-brown);
            box-shadow: 20px 20px 0px var(--soft-beige);
        }

        .menu-main {
            flex: 1 1 60%;
            padding: clamp(20px, 5vw, 60px);
            border-right: 2px dashed var(--point-brown);
        }

        .menu-sub {
            flex: 1 1 40%;
            padding: clamp(20px, 4vw, 40px);
            background: var(--bg-cream);
        }

        .section-title {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 25px;
            color: var(--main-orange);
            border-bottom: 3px solid var(--point-brown);
            display: inline-block;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid rgba(93, 46, 0, 0.1);
            font-weight: 700;
            font-size: clamp(1rem, 1.5vw, 1.3rem);
        }

        .menu-item .price { color: var(--main-orange); font-style: italic; }

        /* [Media Queries] */
        @media (max-width: 1800px) { .wrapper { width: 95%; } }

        @media (max-width: 1200px) {
            .content-grid { margin: 0 20px; margin-top: -30px; }
        }

        @media (max-width: 980px) {
            .content-grid { flex-direction: column; margin-top: 0; border: none; }
            .menu-main { border-right: none; border-bottom: 2px dashed var(--point-brown); }
            .hero-header { height: 50vh; }
        }

        @media (max-width: 400px) {
            .hero-header h1 { font-size: 3.5rem; }
            .hero-header p { font-size: 1rem; }
            .menu-item { flex-direction: column; align-items: flex-start; }
            .menu-item .price { margin-top: 5px; }
        }

        /* 장식용 스티커 */
        .sticker {
            position: absolute;
            top: -30px;
            right: -30px;
            width: 100px;
            height: 100px;
            background: #FFD700;
            border: 3px solid var(--point-brown);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            transform: rotate(15deg);
            z-index: 20;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header class="hero-header">
            <h1>MUNBONG<br>KATSU</h1>
            <p>겉바속촉의 정석, 문봉 돈까스</p>
        </header>

        <main class="content-grid">
            <div class="sticker">BEST<br>PICK!</div>
            
            <section class="menu-main">
                <h2 class="section-title">STEADY SELLER</h2>
                <div class="menu-item"><span>돈까스 스파게티 세트</span> <span class="price">Signature</span></div>
                <div class="menu-item"><span>문봉 정식 (돈까스+함박)</span> <span class="price">Best</span></div>
                <div class="menu-item"><span>돈까스 순두부 세트</span> <span class="price">Hot</span></div>
                <div class="menu-item"><span>부대 순두부 돈까스 세트</span> <span class="price">New</span></div>
                <div class="menu-item"><span>클래식 돈까스 (1인분)</span> <span class="price">Classic</span></div>
            </section>

            <section class="menu-sub">
                <h2 class="section-title">SIDES & MORE</h2>
                <div class="menu-item"><span>김치 어묵 우동</span> <span class="price">Warm</span></div>
                <div class="menu-item"><span>토마토 스파게티</span> <span class="price">Kids</span></div>
                <div class="menu-item"><span>돈까스 반모밀 세트</span> <span class="price">Cool</span></div>
                <div class="menu-item"><span>냉모밀 (여름 한정)</span> <span class="price">Season</span></div>
            </div>
        </main>
    </div>

</body>
</html>
