<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donkatsu House | Trendy & Crispy</title>
    <style>
        :root {
            --primary-orange: #ff5e00; /* 미미미 느낌의 채도 높은 포인트 컬러 */
            --bg-cream: #fff9f0;
            --text-black: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-cream);
            font-family: 'Pretendard', sans-serif;
            color: var(--text-black);
            overflow-x: hidden;
        }

        /* 1. Header: 유연하게 늘어나는 네비게이션 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5vw;
            position: sticky;
            top: 0;
            background: rgba(255,249,240,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .logo {
            font-weight: 900;
            font-size: clamp(1.5rem, 3vw, 2rem);
            color: var(--primary-orange);
            text-transform: uppercase;
        }

        /* 2. Hero Section: 화면을 꽉 채우는 역동적 텍스트 */
        .hero {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero h1 {
            /* clamp를 사용해 미디어쿼리 없이 폰트 크기 조절 */
            font-size: clamp(3rem, 12vw, 10rem);
            line-height: 0.9;
            margin: 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.5rem);
            margin-top: 20px;
        }

        /* 3. Main Menu Grid: 미미미 스타일의 자유로운 배치 */
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            padding: 100px 5vw;
        }

        .menu-item {
            position: relative;
            transition: transform 0.3s ease;
        }

        .menu-item:hover {
            transform: translateY(-10px) rotate(2deg);
        }

        .menu-img {
            width: 100%;
            aspect-ratio: 1 / 1; /* 정사각형 유지 */
            background: #eee;
            border-radius: 40px; /* 둥근 모서리 */
            object-fit: cover;
            border: 3px solid var(--text-black);
        }

        .menu-desc {
            margin-top: 15px;
            font-weight: 700;
            font-size: 1.2rem;
        }

        /* 4. Floating Object: 둥둥 떠다니는 장식 (선택사항) */
        .badge {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: clamp(80px, 10vw, 120px);
            height: clamp(80px, 10vw, 120px);
            background: var(--primary-orange);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transform: rotate(-15deg);
            box-shadow: 10px 10px 0px var(--text-black);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Don-House</div>
        <nav>MENU / STORY / STORE / CONTACT</nav>
    </header>

    <section class="hero">
        <h1>CRISPY<br>ENERGY</h1>
        <p>평범한 돈까스가 아닌, 감각을 깨우는 한 입.</p>
    </section>

    <section class="menu-container">
        <div class="menu-item">
            <div class="menu-img" style="background: #ffd700;"> </div>
            <div class="menu-desc">오리지널 카츠 12.0</div>
        </div>
        <div class="menu-item" style="margin-top: 50px;"> <div class="menu-img" style="background: #ff6b6b;"></div>
            <div class="menu-desc">와사비 크림 카츠 14.0</div>
        </div>
        <div class="menu-item">
            <div class="menu-img" style="background: #4ecdc4;"></div>
            <div class="menu-desc">트러플 오일 카츠 16.0</div>
        </div>
    </section>

    <div class="badge">OPEN NOW</div>

</body>
</html>
