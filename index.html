<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MUNBONG TONKATSU | 문봉 돈까스</title>
    <style>
        :root {
            --point-yellow: #FFD200;
            --point-pink: #FF69B4;
            --main-orange: #FF4500;
            --bg-white: #FFFFFF;
            --dark: #111;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            background: #f0f0f0;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 지정해주신 980*520 컨테이너 */
        .container {
            width: 980px;
            height: 520px;
            background: var(--bg-white);
            border: 4px solid var(--dark);
            position: relative;
            overflow: hidden;
            display: flex;
        }

        /* 왼쪽: 스테디셀러 하이라이트 (미미미 스타일 슬라이더 느낌) */
        .hero-side {
            width: 60%;
            height: 100%;
            background: var(--point-yellow);
            border-right: 4px solid var(--dark);
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .steady-tag {
            background: var(--dark);
            color: white;
            display: inline-block;
            padding: 5px 15px;
            font-weight: 800;
            font-size: 14px;
            margin-bottom: 10px;
            width: fit-content;
        }

        .main-title {
            /* clamp 활용: 컨테이너 크기 변화에 유동적으로 대응 */
            font-size: clamp(3rem, 5vw, 4.5rem);
            font-weight: 900;
            line-height: 1.1;
            color: var(--dark);
            text-transform: uppercase;
        }

        .main-title span { color: var(--main-orange); }

        /* 오른쪽: 메뉴 리스트 스크롤 */
        .menu-side {
            width: 40%;
            height: 100%;
            padding: 30px;
            overflow-y: auto;
            background: var(--bg-white);
        }

        .section-label {
            font-weight: 900;
            font-size: 1.2rem;
            border-bottom: 3px solid var(--dark);
            margin-bottom: 15px;
            padding-bottom: 5px;
        }

        .menu-list { list-style: none; }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #ccc;
            font-weight: 600;
            transition: transform 0.2s;
            cursor: pointer;
        }
        .menu-item:hover {
            transform: translateX(10px);
            color: var(--main-orange);
        }
        .menu-item .price { font-weight: 800; color: var(--dark); }
        .menu-item .tag-summer { 
            font-size: 10px; 
            background: #007bff; 
            color: white; 
            padding: 2px 5px; 
            border-radius: 3px;
        }

        /* 하단 플로팅 배지 */
        .floating-badge {
            position: absolute;
            bottom: 20px;
            left: 560px; /* 경계선 근처 */
            width: 100px;
            height: 100px;
            background: var(--point-pink);
            border: 3px solid var(--dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 900;
            transform: rotate(-10px);
            box-shadow: 5px 5px 0px var(--dark);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="hero-side">
            <div class="steady-tag">STEADY SELLER</div>
            <h1 class="main-title">MUNBONG<br><span>STATION</span></h1>
            <p style="margin-top:20px; font-weight:700;">돈까스 스파게티 세트 / 문봉 정식 / 순두부 세트</p>
        </div>

        <div class="menu-side">
            <div class="section-label">BEST COMBOS</div>
            <ul class="menu-list">
                <li class="menu-item"><span>돈까스 순두부 세트</span> <span class="price">SET</span></li>
                <li class="menu-item"><span>부대 순두부 돈까스</span> <span class="price">SET</span></li>
                <li class="menu-item"><span>돈까스 반모밀 세트</span> <span class="price">SET</span></li>
            </ul>

            <div class="section-label" style="margin-top:30px;">CLASSIC & OTHERS</div>
            <ul class="menu-list">
                <li class="menu-item"><span>돈까스 1인분 (Classic)</span> <span class="price">Best</span></li>
                <li class="menu-item"><span>김치 어묵 우동</span> <span class="price">Hot</span></li>
                <li class="menu-item"><span>토마토 스파게티</span> <span class="price">Kids</span></li>
                <li class="menu-item"><span>냉모밀 <b class="tag-summer">여름 한정</b></span> <span class="price">New</span></li>
            </ul>
        </div>

        <div class="floating-badge">CRISPY<br>TASTY</div>
    </div>

</body>
</html>
